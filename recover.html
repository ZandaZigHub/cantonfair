<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zanda — Recover Data</title>
<style>
body{font-family:sans-serif;padding:1rem;background:#f5f5f3;color:#383d4f}
h2{margin-bottom:1rem}
.card{background:#fff;border-radius:10px;padding:1rem;margin-bottom:.75rem;border:1.5px solid #e0ddd9}
.btn{padding:.75rem 1.25rem;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:1rem;width:100%;margin-bottom:.5rem}
.bp{background:#383d4f;color:#fff}
.bg{background:#296366;color:#fff}
.br{background:#b94040;color:#fff}
pre{font-size:.7rem;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;background:#f5f5f3;padding:.5rem;border-radius:6px}
#status{padding:.75rem;border-radius:8px;margin-bottom:.75rem;font-weight:600;display:none}
</style>
</head>
<body>
<h2>🔧 Zanda Data Recovery</h2>
<div id="status"></div>

<div class="card">
  <strong>Step 1</strong> — Scan all localStorage keys on this device<br>
  <small style="color:#7a7a7a">This reads everything stored by the Canton Fair app</small><br><br>
  <button class="btn bp" onclick="scanAll()">🔍 Scan localStorage Now</button>
</div>

<div class="card" id="results" style="display:none">
  <strong>Found data:</strong>
  <div id="data-display"></div>
</div>

<div class="card" id="upload-card" style="display:none">
  <strong>Step 2</strong> — Push to Supabase so the main app can see it<br><br>
  <button class="btn bg" onclick="uploadAll()">☁ Upload All to Supabase</button>
  <br>
  <button class="btn" style="background:#8a6d20;color:#fff;margin-top:.5rem" onclick="dumpRaw()">🔍 Inspect Raw Meeting Data</button>
</div>

<div class="card" id="raw-card" style="display:none">
  <strong>Raw data structure:</strong><br><br>
  <pre id="raw-dump" style="font-size:.65rem;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-all"></pre>
  <button class="btn bp" onclick="forceExtract()" style="margin-top:.5rem">⚡ Force Extract All Meetings</button>
</div>

<script>
const SUPA_URL = 'https://tusbnuhmdhwggcsnxumd.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1c2JudWhtZGh3Z2djc254dW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMjE4MDYsImV4cCI6MjA5MTc5NzgwNn0.d57PdqCDt_0PthKzyZRqK_Mqefz5CX216A9iB-twxVU';

let allMeetings = [];
let allSuppliers = [];
let allHitlist = [];

function setStatus(msg, color){
  const el = document.getElementById('status');
  el.style.display = 'block';
  el.style.background = color === 'green' ? '#eaf3f3' : color === 'red' ? '#fdf0f0' : '#fdf8ee';
  el.style.color = color === 'green' ? '#296366' : color === 'red' ? '#b94040' : '#8a6d20';
  el.style.border = '1.5px solid ' + (color === 'green' ? '#a0cccc' : color === 'red' ? '#e0a0a0' : '#d4c47a');
  el.textContent = msg;
}

function scanAll(){
  allMeetings = [];
  allSuppliers = [];
  allHitlist = [];
  
  const display = document.getElementById('data-display');
  let html = '<div style="font-weight:700;margin-bottom:.5rem">ALL localStorage keys (' + localStorage.length + ' total):</div>';
  
  if(localStorage.length === 0){
    html += '<div style="color:#b94040;padding:.5rem 0">localStorage is completely empty on this device.</div>';
  }
  
  for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    const raw = localStorage.getItem(key);
    html += '<div style="padding:.3rem 0;border-bottom:1px solid #e0ddd9;font-size:.8rem"><code style="background:#e8e4d4;padding:.1rem .3rem;border-radius:3px">' + key + '</code> — ' + (raw ? raw.length : 0) + ' chars</div>';
    
    try{
      const val = JSON.parse(raw);
      if(Array.isArray(val) && val.length && val[0] && val[0].supplier){
        allMeetings = [...allMeetings, ...val.filter(m => m.id && m.supplier)];
        html += '<div style="color:#296366;font-size:.8rem;padding-left:.5rem">↳ ✓ Contains ' + val.length + ' meetings</div>';
      }
      if(Array.isArray(val) && val.length && val[0] && val[0].meet_type){
        allSuppliers = [...allSuppliers, ...val];
        html += '<div style="color:#296366;font-size:.8rem;padding-left:.5rem">↳ ✓ Contains ' + val.length + ' suppliers</div>';
      }
      if(Array.isArray(val) && val.length && val[0] && val[0].priority){
        allHitlist = [...allHitlist, ...val];
        html += '<div style="color:#296366;font-size:.8rem;padding-left:.5rem">↳ ✓ Contains ' + val.length + ' hit list items</div>';
      }
    } catch(e){}
  }
  
  // Dedup meetings by id
  const seen = new Set();
  allMeetings = allMeetings.filter(m => { if(seen.has(m.id)) return false; seen.add(m.id); return true; });
  
  if(!allMeetings.length && !allSuppliers.length && !allHitlist.length){
    html = '<div style="color:#b94040">No Canton Fair data found in localStorage on this device.<br><br>The data may have been cleared when the browser updated, or it may be on a different device/browser.</div>';
    setStatus('No data found', 'red');
  } else {
    setStatus(`Found: ${allMeetings.length} meetings · ${allSuppliers.length} suppliers · ${allHitlist.length} hit list items`, 'green');
    document.getElementById('upload-card').style.display = 'block';
    
    // Show meeting summaries
    if(allMeetings.length){
      html += '<div style="margin-top:.75rem;font-weight:700">Meetings found:</div>';
      allMeetings.forEach(m => {
        html += `<div style="padding:.35rem 0;border-bottom:1px solid #e0ddd9;font-size:.85rem"><strong>${m.supplier}</strong> · ${new Date(m.ts).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})} · ${m.duration||'0:00'}${m.transcript ? ' · has transcript' : ''}</div>`;
      });
    }
  }
  
  display.innerHTML = html;
  document.getElementById('results').style.display = 'block';
}

function dumpRaw(){
  const raw = localStorage.getItem('cf2_meetings');
  if(!raw){ alert('No cf2_meetings key found'); return; }
  // Try to parse and show structure
  try{
    const val = JSON.parse(raw);
    let info = 'Type: ' + typeof val + '\n';
    if(Array.isArray(val)){
      info += 'Array length: ' + val.length + '\n';
      if(val[0]) info += 'First item keys: ' + Object.keys(val[0]).join(', ') + '\n';
      info += '\nFirst 3 items:\n' + JSON.stringify(val.slice(0,3), null, 2).slice(0,2000);
    } else {
      info += 'Keys: ' + Object.keys(val).join(', ') + '\n';
      info += JSON.stringify(val, null, 2).slice(0,2000);
    }
    document.getElementById('raw-dump').textContent = info;
    document.getElementById('raw-card').style.display = 'block';
  } catch(e){
    document.getElementById('raw-dump').textContent = 'Parse error: ' + e.message + '\nRaw (first 500): ' + raw.slice(0,500);
    document.getElementById('raw-card').style.display = 'block';
  }
}

async function uploadAll(){
  const btn = document.querySelector('#upload-card .btn');
  btn.textContent = 'Uploading...';
  btn.disabled = true;
  
  let ok = 0, fail = 0;
  
  // Upload meetings
  for(const m of allMeetings){
    const payload = {...m};
    delete payload.photos;
    delete payload.photo;
    try{
      const r = await fetch(`${SUPA_URL}/rest/v1/cf_meetings`, {
        method: 'POST',
        headers: {'Content-Type':'application/json','apikey':SUPA_ANON,'Authorization':'Bearer '+SUPA_ANON,'Prefer':'resolution=merge-duplicates'},
        body: JSON.stringify({id:String(m.id), data:JSON.stringify(payload), updated_at: new Date().toISOString()})
      });
      if(r.ok) ok++; else fail++;
    } catch(e){ fail++; }
  }
  
  // Upload suppliers
  for(const s of allSuppliers){
    try{
      await fetch(`${SUPA_URL}/rest/v1/cf_suppliers`, {
        method: 'POST',
        headers: {'Content-Type':'application/json','apikey':SUPA_ANON,'Authorization':'Bearer '+SUPA_ANON,'Prefer':'resolution=merge-duplicates'},
        body: JSON.stringify({id:String(s.id), data:JSON.stringify(s), updated_at: new Date().toISOString()})
      });
    } catch(e){}
  }

  btn.textContent = '☁ Upload All to Supabase';
  btn.disabled = false;
  
  if(ok > 0){
    setStatus(`✓ Uploaded ${ok} meetings to Supabase. Open the main app and check Meetings tab.`, 'green');
  } else {
    setStatus('Upload failed — check your connection and try again.', 'red');
  }
}

function forceExtract(){
  const raw = localStorage.getItem('cf2_meetings');
  if(!raw) return;
  try{
    const val = JSON.parse(raw);
    let found = [];
    // Try various structures
    if(Array.isArray(val)) found = val;
    else if(val.meetings) found = val.meetings;
    else if(typeof val === 'object'){
      // Could be keyed by id
      found = Object.values(val).filter(v => v && typeof v === 'object' && (v.supplier || v.transcript));
    }
    
    if(found.length){
      allMeetings = found;
      setStatus('Force extracted ' + found.length + ' meetings! Now tap Upload.', 'green');
      // Show list
      let html = document.getElementById('data-display').innerHTML;
      html += '<div style="margin-top:.75rem;font-weight:700;color:#b94040">FORCE EXTRACTED ' + found.length + ' meetings:</div>';
      found.forEach(m => {
        html += '<div style="padding:.25rem 0;border-bottom:1px solid #e0ddd9;font-size:.82rem"><strong>' + (m.supplier||'Unknown') + '</strong> · ' + (m.ts ? new Date(m.ts).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : 'no date') + '</div>';
      });
      document.getElementById('data-display').innerHTML = html;
    } else {
      setStatus('Could not extract meetings from raw data — structure unknown', 'red');
    }
  } catch(e){
    setStatus('Extract failed: ' + e.message, 'red');
  }
}
</script>
</body>
</html>
